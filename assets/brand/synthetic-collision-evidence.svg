    <text x="130" y="553" fill="#e2e8f0" font-size="19">Will both tasks modify this file before implementation or merge?</text>
    <text x="34" y="598" fill="#64748b" font-size="16">Pointers, not snippets · shared paths are evidence, not proof of conflicting intent.</text>

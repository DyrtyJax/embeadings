    <text x="158" y="207" fill="#64748b" font-size="17">·</text>
    <text x="181" y="207" fill="#fde68a" font-size="17" letter-spacing="1.2">ADVISORY</text>

    <rect x="34" y="240" width="1132" height="265" rx="12" fill="#111c30" stroke="#334155"/>
    <text x="64" y="287" fill="#93c5fd" font-size="23" font-weight="700">demo-1</text>
    <text x="163" y="287" fill="#64748b">↔</text>
    <text x="197" y="287" fill="#a7f3d0" font-size="23" font-weight="700">demo-2</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic emBEADings collision report</title>
  <desc id="desc">A terminal-style panel showing a read-only exact-file collision lead between two synthetic work items.</desc>
  <rect width="1200" height="640" rx="18" fill="#0b1220"/>
  <rect x="1" y="1" width="1198" height="638" rx="17" fill="none" stroke="#334155" stroke-width="2"/>
  <path d="M0 74h1200" stroke="#334155" stroke-width="2"/>
  <circle cx="34" cy="37" r="7" fill="#fb7185"/>
  <circle cx="60" cy="37" r="7" fill="#fbbf24"/>
  <circle cx="86" cy="37" r="7" fill="#34d399"/>
  <text x="1160" y="44" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="end">SYNTHETIC EXAMPLE · NO PRIVATE DATA</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">
    <text x="34" y="121" fill="#64748b">$</text>
    <text x="56" y="121" fill="#e2e8f0">embead collisions</text>
